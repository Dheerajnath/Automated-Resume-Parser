version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: resume_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: resumedb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d resumedb"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: resume_web
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/resumedb
      SECRET_KEY: super-secret-key-change-in-production
      UPLOAD_FOLDER: uploads
      FLASK_APP: run.py
      FLASK_ENV: production
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
